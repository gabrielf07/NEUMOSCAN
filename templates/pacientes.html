<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NeumoAI - Pacientes</title>
    <link rel="stylesheet" href="../static/style.css">
    <link rel="stylesheet" href="../static/pacientes.css">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
</head>
<body>
    <div class="dashboard-container">
        <div class="sidebar">
            <div class="sidebar-header">
                <div class="lung-icon-small"></div>
                <h2>NeumoAI</h2>
            </div>
            
            <div class="user-profile">
                <i class="fas fa-user-circle"></i>
                <div class="user-info">
                    <p class="user-name" id="doctor-name">Dr. Nombre Apellido</p>
                    <p class="user-role" id="doctor-specialty">Especialidad</p>
                </div>
            </div>

            <nav class="sidebar-nav">
                <a href="/dashboards.html" class="nav-item">
                    <i class="fas fa-chart-line"></i>
                    <span>Resumen</span>
                </a>
                <a href="#" class="nav-item active" data-section="patients">
                    <i class="fas fa-user-injured"></i>
                    <span>Pacientes</span>
                </a>
                <a href="/dashboards.html" class="nav-item">
                    <i class="fas fa-x-ray"></i>
                    <span>Evaluaciones</span>
                </a>
                <a href="/dashboards.html" class="nav-item">
                    <i class="fas fa-history"></i>
                    <span>Historial</span>
                </a>
                <a href="/dashboards.html" class="nav-item">
                    <i class="fas fa-cogs"></i>
                    <span>Configuración</span>
                </a>
            </nav>

            <button class="logout-btn" id="logout-btn">
                <i class="fas fa-sign-out-alt"></i>
                <span>Cerrar Sesión</span>
            </button>
        </div>

        <div class="main-content">
            <div class="content-header">
                <h1 id="section-title">Gestión de Pacientes</h1>
            </div>

            <!-- El ID debe ser patients-section para que coincida con el JS si se quisiera reutilizar lógica de ocultar/mostrar si fuera SPA, 
                 pero al ser página dedicada, siempre mostramos esto. 
                 Mantenemos la estructura de ID para compatibilidad con selectores de JS existentes si los hubiera. -->
            <div class="content-section active" id="patients-section" style="display: block;">
                <div class="form-container">
                    <div class="form-toggle">
                        <button class="toggle-btn active" id="add-patient-toggle">Añadir Nuevo</button>
                        <button class="toggle-btn" id="view-patients-toggle">Ver Todos</button>
                    </div>
                    
                    <form id="add-patient-form" class="form active">
                        <h3 class="form-title">Datos del Paciente</h3>
                        
                        <div class="name-fields">
                            <div class="input-group">
                                <label for="patient-primer-nombre">Primer Nombre *</label>
                                <input type="text" id="patient-primer-nombre" required placeholder="Ej: Juan">
                            </div>
                            <div class="input-group">
                                <label for="patient-segundo-nombre">Segundo Nombre</label>
                                <input type="text" id="patient-segundo-nombre" placeholder="Ej: David">
                            </div>
                        </div>
                        
                        <div class="name-fields">
                            <div class="input-group">
                                <label for="patient-primer-apellido">Primer Apellido *</label>
                                <input type="text" id="patient-primer-apellido" required placeholder="Ej: Pérez">
                            </div>
                            <div class="input-group">
                                <label for="patient-segundo-apellido">Segundo Apellido</label>
                                <input type="text" id="patient-segundo-apellido" placeholder="Ej: Vásquez">
                            </div>
                        </div>
                        
                        <div class="input-group">
                            <label for="patient-cedula">Cédula de Identidad *</label>
                            <input type="text" id="patient-cedula" required maxlength="10" placeholder="Ej: 98765432"
                                   oninput="this.value = this.value.replace(/[^0-9]/g, '')">
                            <small class="input-hint">Solo números (8-10 dígitos)</small>
                        </div>

                        <div class="input-group">
                            <label for="patient-telefono">Número de Teléfono *</label>
                            <input type="tel" id="patient-telefono" required placeholder="Ej: 04121234567" maxlength="11"
                                   oninput="this.value = this.value.replace(/[^0-9]/g, '')">
                            <small class="input-hint">11 dígitos, debe comenzar con 04</small>
                        </div>

                        <div class="input-group">
                            <label for="patient-email">Correo Electrónico</label>
                            <input type="email" id="patient-email" placeholder="Ej: paciente@email.com">
                        </div>
                        
                        <button type="submit" class="btn">Guardar Paciente</button>
                        <div id="patient-message" class="message"></div>
                    </form>

                    <div id="view-patients-section" class="form">
                        <h3 class="form-title">Mis Pacientes</h3>
                        <div id="patient-list" class="patient-list">
                            </div>
                        <div id="no-patients-message" style="display: none; text-align: center; color: #6c757d; margin-top: 20px;">
                            Todavía no tienes pacientes registrados.
                        </div>
                    </div>
                </div>
            </div>
            <!-- Elementos ocultos necesarios para que no falle el JS si busca estos IDs -->
            <div class="content-section" id="overview-section"></div>
            <div class="content-section" id="evaluations-section"></div>
            <div class="content-section" id="history-section"></div>
            <div class="content-section" id="settings-section"></div>
        </div>
    </div>
    
    <script src="/static/pacientes.js"></script>
</body>
</html>
