<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NeumoAI - Detección de Neumonía</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
    <div class="container">
        <div class="left-panel">
            <div class="lung-icon"></div>
            <h2>NeumoAI</h2>
            <p>Sistema de detección temprana de neumonía mediante inteligencia artificial y radiografías de tórax.</p>
        </div>
        <div class="right-panel">
            <div class="form-container">
                <div class="form-toggle">
                    <button class="toggle-btn active" id="login-toggle">Iniciar Sesión</button>
                    <button class="toggle-btn" id="register-toggle">Registrarse</button>
                </div>
                
                <form id="login-form" class="form active">
                    <div class="input-group">
                        <label for="login-identificacion">Correo Electrónico o Cédula</label>
                        <input type="text" id="login-identificacion" required 
                               placeholder="Ingresa tu correo o cédula">
                    </div>
                    <div class="input-group">
                        <label for="login-password">Contraseña</label>
                        <input type="password" id="login-password" required 
                               placeholder="Ingresa tu contraseña">
                    </div>
                    <button type="submit" class="btn">Iniciar Sesión</button>
                </form>
                
                <form id="register-form" class="form">
                    <h3 class="form-title">Datos Personales</h3>
                    
                    <div class="name-fields">
                        <div class="input-group">
                            <label for="register-primer-nombre">Primer Nombre *</label>
                            <input type="text" id="register-primer-nombre" required 
                                   placeholder="Ej: María">
                        </div>
                        <div class="input-group">
                            <label for="register-segundo-nombre">Segundo Nombre</label>
                            <input type="text" id="register-segundo-nombre" 
                                   placeholder="Ej: José">
                        </div>
                    </div>
                    
                    <div class="name-fields">
                        <div class="input-group">
                            <label for="register-primer-apellido">Primer Apellido *</label>
                            <input type="text" id="register-primer-apellido" required 
                                   placeholder="Ej: González">
                        </div>
                        <div class="input-group">
                            <label for="register-segundo-apellido">Segundo Apellido</label>
                            <input type="text" id="register-segundo-apellido" 
                                   placeholder="Ej: Rodríguez">
                        </div>
                    </div>
                    
                    <div class="input-group">
                        <label for="register-cedula">Cédula de Identidad *</label>
                        <input type="text" id="register-cedula" required 
                               placeholder="Ej: 12345678" maxlength="10"
                               oninput="this.value = this.value.replace(/[^0-9]/g, '')">
                        <small class="input-hint">Solo números (8-10 dígitos)</small>
                    </div>
                    
                    <h3 class="form-title">Datos de Contacto</h3>
                    
                    <div class="input-group">
                        <label for="register-email">Correo Electrónico *</label>
                        <input type="email" id="register-email" required 
                               placeholder="Ej: medico@hospital.com">
                    </div>
                    
                    <div class="input-group">
                        <label for="register-telefono">Número de Teléfono *</label>
                        <input type="tel" id="register-telefono" required 
                               placeholder="Ej: 04123456789" maxlength="11"
                               oninput="this.value = this.value.replace(/[^0-9]/g, '')">
                        <small class="input-hint">11 dígitos, debe comenzar con 04</small>
                    </div>
                    
                    <h3 class="form-title">Datos Profesionales</h3>
                    
                    <div class="input-group">
                        <label>Especialidad Médica *</label>
                        <div class="radio-group">
                            <label class="radio-option">
                                <input type="radio" name="especialidad" value="radiologo" required>
                                <span class="radio-checkmark"></span>
                                Radiólogo
                            </label>
                            <label class="radio-option">
                                <input type="radio" name="especialidad" value="neumologo">
                                <span class="radio-checkmark"></span>
                                Neumólogo
                            </label>
                            <label class="radio-option">
                                <input type="radio" name="especialidad" value="medico_general">
                                <span class="radio-checkmark"></span>
                                Médico General
                            </label>
                        </div>
                    </div>
                    
                    <h3 class="form-title">Seguridad</h3>
                    
                    <div class="input-group">
                        <label for="register-password">Contraseña *</label>
                        <input type="password" id="register-password" required 
                               placeholder="Mínimo 6 caracteres" minlength="6">
                    </div>
                    
                    <div class="input-group">
                        <label for="register-confirm">Confirmar Contraseña *</label>
                        <input type="password" id="register-confirm" required 
                               placeholder="Repite tu contraseña">
                    </div>
                    
                    <button type="submit" class="btn">Registrarse</button>
                </form>
                
                <div id="message" class="message"></div>
            </div>
        </div>
    </div>

    <script src="/static/script.js"></script>
</body>
</html>
